controller_manager:
  ros__parameters:

    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:

    left_wheel_names:
      - bottom_left_wheel_joint

    right_wheel_names:
      - bottom_right_wheel_joint

    wheel_separation: 0.42
    wheel_radius: 0.0425
    publish_rate: 50.0
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

    cmd_vel_topic: /cmd_vel  # does not work
    use_stamped_vel: true  # Set to true if using geometry_msgs/msg/TwistStamped for cmd_vel
    cmd_vel_timeout: 0.5